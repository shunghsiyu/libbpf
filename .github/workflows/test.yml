name: libbpf-ci

on:
  pull_request:
  push:
  schedule:
    - cron:  '0 18 * * *'

concurrency:
  group: ci-test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  vmtest-stable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: '6.19'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            # LLVM 22 packages were never published on apt.llvm.org for Ubuntu
            # Noble (24.04) — stay on LLVM 21 for stable kernels.
            llvm-version: '21'
            pahole: 'master'
          - kernel: '6.18'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            # LLVM 22 packages were never published on apt.llvm.org for Ubuntu
            # Noble (24.04) — stay on LLVM 21 for stable kernels.
            llvm-version: '21'
            pahole: 'master'
          - kernel: '6.12'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '18'
            pahole: 'master'
          - kernel: '6.6'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '18'
            pahole: 'master'
    name: Stable Linux ${{ matrix.kernel }} llvm-${{ matrix.llvm-version }}
    uses: ./.github/workflows/vmtest-stable.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      kernel: ${{ matrix.kernel }}
      arch: ${{ matrix.arch }}
      llvm-version: ${{ matrix.llvm-version }}
      pahole: ${{ matrix.pahole }}
  vmtest-mainline:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: 'LATEST'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            # LLVM 22 packages were broken on apt.llvm.org for Ubuntu Noble
            # (24.04) — the Packages file was empty (llvm-project#183715).
            # That issue is now closed and LLVM 22.1.x has been officially
            # released; use it for mainline testing.
            llvm-version: '22'
            pahole: 'master'
    name: Mainline Linux ${{ matrix.kernel }} llvm-${{ matrix.llvm-version }}
    uses: ./.github/workflows/vmtest-mainline.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      kernel: ${{ matrix.kernel }}
      arch: ${{ matrix.arch }}
      llvm-version: ${{ matrix.llvm-version }}
      pahole: ${{ matrix.pahole }}
  vmtest-opensuse:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: 'SL-16.0'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '18'
            pahole: 'master'
          - kernel: 'SL-16.1'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '21'
            pahole: 'master'
    name: openSUSE ${{ matrix.kernel }} llvm-${{ matrix.llvm-version }}
    uses: ./.github/workflows/vmtest-opensuse.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      kernel: ${{ matrix.kernel }}
      arch: ${{ matrix.arch }}
      llvm-version: ${{ matrix.llvm-version }}
      pahole: ${{ matrix.pahole }}
