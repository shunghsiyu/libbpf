name: libbpf-ci

on:
  pull_request:
  push:
  schedule:
    - cron:  '0 18 * * *'

concurrency:
  group: ci-test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  vmtest-stable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: '6.19'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            # Unfortunately as of 2026-02-24 LLVM newer than 21 cannot be
            # install through apt.llvm.org/llvm.sh yet
            llvm-version: '21'
            pahole: 'master'
          - kernel: '6.18'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '21'
            pahole: 'master'
          - kernel: '6.12'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            llvm-version: '18'
            pahole: 'master'
    name: Stable Linux ${{ matrix.kernel }} llvm-${{ matrix.llvm-version }}
    uses: ./.github/workflows/vmtest-stable.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      kernel: ${{ matrix.kernel }}
      arch: ${{ matrix.arch }}
      llvm-version: ${{ matrix.llvm-version }}
      pahole: ${{ matrix.pahole }}
