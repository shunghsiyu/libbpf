name: mainline-ci

on:
  pull_request:
  push:
  schedule:
    - cron:  '0 17 * * *'

concurrency:
  group: mainline-ci-test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  vmtest-mainline:
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: 'LATEST'
            runs_on: 'ubuntu-24.04'
            arch: 'x86_64'
            # Unfortunately as of 2026-02-24 LLVM newer than 21 cannot be
            # install through apt.llvm.org/llvm.sh yet
            llvm-version: '21'
            pahole: 'master'
    name: Mainline Linux ${{ matrix.kernel }} llvm-${{ matrix.llvm-version }}
    uses: ./.github/workflows/vmtest-mainline.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      kernel: ${{ matrix.kernel }}
      arch: ${{ matrix.arch }}
      llvm-version: ${{ matrix.llvm-version }}
      pahole: ${{ matrix.pahole }}
